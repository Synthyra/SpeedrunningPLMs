# Synthyra Conv UNet Configuration
# Uses batched UNet transformer with Swin-style patch merging/expanding
# max_length must be a power of 2 for the UNet downsampling to work
# CLI arguments will override these values where provided
# Security note: tokens (--hf_token, --wandb_token) must be passed via CLI

# General Configuration
bugfix: false
save_path: "Synthyra/speedrun_conv_unet"
data_name: "uniref50"
num_chunks: 197
log_name: null

# Distributed Training & Reproducibility
seed: 42
clear_cache_every: 1000
grad_clip: 0.0
auto_grad_clip: false
auto_grad_clip_p: 10.0

# Model Architecture
# NOTE: More heads allow greater hidden dim growth in the UNet (Swin-style).
# With 12 heads and hidden=768: head_dim=64 at base, grows to 128 at deepest.
# With only 6 heads: hidden dimension is capped to keep head_dim <= 128.
hidden_size: 768
num_attention_heads: 12
num_hidden_layers: 0  # Not used for conv_unet
num_unet_layers: 12   # 6 encoder + 6 decoder
num_extra_layers: 2    # Extra full-resolution transformer layers after UNet
vocab_size: 33
expansion_ratio: 2.0
soft_logit_cap: 32.0
tie_embeddings: false
unet: false            # Standard UNet off
conv_unet: true        # Batched Conv UNet on
token_dropout: false
bfloat16: true
compile_model: true
compile_flex_attention: true
dynamo_recompile_limit: 32

# Data & MLM Configuration
mlm: true
masked_diffusion: false
mask_rate: 0.2
starting_mask_rate: 0.5
mask_rate_steps: 5000
mask_rate_schedule: true

# Optimization & Schedule
batch_size: 1048576     # Total tokens across all GPUs
grad_accum: 8
num_steps: 25000
cooldown_steps: 5000
max_length: 2048       # Must be power of 2 for patch merging
scheduler_type: "cosine"
lr_warmup_steps: 1000

# Adam Optimizer Parameters
lr: 0.001
lr_embed: 0.005
lr_head: 0.005
lr_scalar: 0.005

# Muon Optimizer Parameters
use_muon: true
lr_hidden: 0.005
muon_momentum_warmup_steps: 100

# Evaluation & Logging
eval_every: 1000
hf_model_name: "lhallee/speedrun_conv_unet"
save_every: null

# Dataloader Parameters
num_workers: 4
prefetch_factor: 8
