# Synthyra Training Configuration
# This YAML file defines all available training parameters
# CLI arguments will override these values where provided
# Security note: tokens (--hf_token, --wandb_token) must be passed via CLI

# General Configuration
bugfix: false
save_path: "Synthyra/speedrun_test"
data_name: "uniref50"
num_chunks: 197
log_name: null # If null, a random UUID will be generated

# Distributed Training & Reproducibility
seed: 42
clear_cache_every: 1000
grad_clip: 0.0
auto_grad_clip: true
auto_grad_clip_p: 10.0

# Model Architecture
hidden_size: 768
num_attention_heads: 6
num_hidden_layers: 24
num_unet_layers: 0 # Number of layers for Conv1D UNet (set to > 0 to use)
num_extra_layers: 0 # Number of extra transformer layers after UNet
vocab_size: 33
expansion_ratio: 2.0
soft_logit_cap: 32.0
tie_embeddings: false
unet: true
conv_unet: false # Use Conv1D UNet with downsampling
token_dropout: false
bfloat16: true
compile_model: true
compile_flex_attention: true
dynamo_recompile_limit: 32

# Data & MLM Configuration
mlm: true
masked_diffusion: false
mask_rate: 0.3
starting_mask_rate: 0.1
mask_rate_steps: 10000
mask_rate_schedule: true

# Optimization & Schedule
batch_size: 524288 # Total tokens across all GPUs
grad_accum: 8
num_steps: 50000
cooldown_steps: 10000
max_length: 2048
scheduler_type: "cosine"
lr_warmup_steps: 1000

# Adam Optimizer Parameters (Used for embeddings, head, and scalars if Muon is enabled)
lr: 0.0001
lr_embed: 0.001
lr_head: 0.001
lr_scalar: 0.001

# Muon Optimizer Parameters
use_muon: true
lr_hidden: 0.001
muon_momentum_warmup_steps: 300

# Evaluation & Logging
eval_every: 1000
hf_model_name: "lhallee/speedrun"
save_every: null # Number of steps between checkpoints

# Dataloader Parameters
num_workers: 4
prefetch_factor: 8
