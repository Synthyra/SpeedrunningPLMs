# Synthyra Debug Configuration
# Small model and short training run for testing purposes
# CLI arguments will override these values where provided
# Security note: tokens (--hf_token, --wandb_token) must be passed via CLI

# General Configuration
save_path: "Synthyra/debug_test"
data_name: "uniref50"
num_chunks: 10
log_name: "debug_run"

# Distributed Training & Reproducibility
seed: 42
clear_cache_every: 100
grad_clip: 0.0
auto_grad_clip: true
auto_grad_clip_p: 10.0

# Model Architecture
hidden_size: 128
num_attention_heads: 2
num_hidden_layers: 2
num_unet_layers: 0
num_extra_layers: 0
vocab_size: 33
expansion_ratio: 2.0
soft_logit_cap: 16.0
tie_embeddings: false
unet: true
conv_unet: false
token_dropout: true
bfloat16: true

# Data & MLM Configuration
mlm: false
masked_diffusion: true
mask_rate: 0.2
starting_mask_rate: 0.1
mask_rate_steps: 100
mask_rate_schedule: true

# Optimization & Schedule
batch_size: 8192
grad_accum: 1
num_steps: 1000
cooldown_steps: 100
max_length: 512
scheduler_type: "cosine"
lr_warmup_steps: 100

# Adam Optimizer Parameters
lr: 0.0001
lr_embed: 0.001
lr_head: 0.001
lr_scalar: 0.001

# Muon Optimizer Parameters
use_muon: true
lr_hidden: 0.001
muon_momentum_warmup_steps: 100

# Evaluation & Logging
eval_every: 100
hf_model_name: null
save_every: null

# Dataloader Parameters
num_workers: 4
prefetch_factor: 8
