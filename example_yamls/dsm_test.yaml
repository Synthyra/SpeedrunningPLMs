# Synthyra Training Configuration
# This YAML file defines all available training parameters
# CLI arguments will override these values where provided
# Security note: tokens (--token, --wandb_token) and log_name must be passed via CLI

# Model Configuration
save_path: "Synthyra/speedrun_dsm_large_test"
log_name: "dsm_large_test"

# Distributed Training
seed: 42
clear_cache_every: 1000

# Model Architecture
hidden_size: 128
num_attention_heads: 6
num_hidden_layers: 6
vocab_size: 33
expansion_ratio: 3.0
soft_logit_cap: 32.0
attention_soft_cap: 64.0
add_att_soft_cap: false
tie_embeddings: false
unet: true
token_dropout: false
bfloat16: true

# Data Configuration
mlm: false  # Masked Language Modeling
masked_diffusion: true
mask_rate: 0.5
mask_rate_schedule: true
starting_mask_rate: 0.05
mask_rate_steps: 500

# Training Hyperparameters
batch_size: 2048
grad_accum: 1
num_steps: 1000
cooldown_steps: 100
max_length: 1024
scheduler_type: "cosine"
lr_warmup_steps: 100

# Optimizer Configuration
# Adam optimizer (for embeddings, head, scalars when using Muon)
lr: 0.001  # Learning rate when not using Muon
lr_embed: 0.06
lr_head: 0.008
lr_scalar: 0.04
grad_clip: 0.0
auto_grad_clip: true
auto_grad_clip_p: 10

# Muon optimizer (for hidden layers)
use_muon: true
lr_hidden: 0.05
muon_momentum_warmup_steps: 1000

# Evaluation and Logging
eval_every: 1000
hf_model_name: "lhallee/speedrun"
save_every: null  # Set to a number to save checkpoints every N steps

# Dataloader Configuration
num_workers: 4
prefetch_factor: 2
